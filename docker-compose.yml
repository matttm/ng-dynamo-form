services:
  localstack:
    image: localstack/localstack:3.7.2
    container_name: ng-dynamo-form-localstack
    ports:
      - "4566:4566"
    environment:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DEBUG: 1
      LS_LOG: warn
      SERVICES: dynamodb
    volumes:
      - ./.localstack:/var/lib/localstack
      - ./docker/localstack/init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal dynamodb list-tables >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: ng-dynamo-form-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: form_app
      MYSQL_USER: form_user
      MYSQL_PASSWORD: form_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
