<main class="shell">
  <header class="shell-header">
    <div>
      <p class="eyebrow">Program Configuration Workspace</p>
      <h1>Dynamic Intake Form</h1>
      <p class="intro">
        Switch the program year to load a different backend configuration and render its configured sections.
      </p>
    </div>

    <div class="selection-card">
      <label class="selection-field" for="formId">
        <span>Form</span>
        <select id="formId" [(ngModel)]="selectedFormId" (ngModelChange)="navigateToSelection()">
          <option *ngFor="let option of formOptions" [value]="option.value">{{ option.label }}</option>
        </select>
      </label>

      <label class="selection-field" for="year">
        <span>Program Year</span>
        <select id="year" [(ngModel)]="selectedYear" (ngModelChange)="navigateToSelection()">
          <option *ngFor="let year of yearOptions" [ngValue]="year">{{ year }}</option>
        </select>
      </label>
    </div>
  </header>

  <section class="workspace-panel">
    <router-outlet></router-outlet>
  </section>
</main>
